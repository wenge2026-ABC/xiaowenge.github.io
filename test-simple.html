<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测试 - 高晓文博客</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Supabase SDK - 使用国内镜像 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/@supabase/supabase-js/2.39.0/supabase.min.js"></script>
</head>
<body>

<h1>测试页面</h1>
<p id="status">正在检查 Supabase...</p>
<p id="user-status">用户状态: 未检查</p>

<button onclick="testSupabase()">测试 Supabase 连接</button>
<button onclick="testNavigation()">测试导航</button>

<div id="test-nav">
  <a href="#" class="nav-item" data-page="home">首页</a>
  <a href="#" class="nav-item" data-page="blog">博客</a>
  <a href="#" class="nav-item" data-page="photos">相册</a>
</div>

<div id="test-pages">
  <div id="page-home" class="page active">首页内容</div>
  <div id="page-blog" class="page">博客内容</div>
  <div id="page-photos" class="page">相册内容</div>
</div>

<script>
// 测试 Supabase 配置
const SUPABASE_URL = 'https://bfgdwbkpjfhyossyojyt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZ2R3YmtwamZoeW9zc3lvanl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTEyNzAsImV4cCI6MjA5MDI4NzI3MH0.iRe_lKMspgMEiYT0sCkQp7SiItqOmVOG7_Ljj317im4';

let supabaseClient;

// 页面加载时检查
window.onload = function() {
  console.log('🚀 测试页面加载完成');
  
  if (typeof window.supabase !== 'undefined') {
    document.getElementById('status').textContent = '✅ Supabase SDK 已加载';
    
    try {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      document.getElementById('status').textContent += ' - 初始化成功';
      console.log('✅ Supabase 初始化成功');
    } catch (e) {
      document.getElementById('status').textContent = '❌ Supabase 初始化失败: ' + e.message;
      console.error('❌ Supabase 初始化失败:', e);
    }
  } else {
    document.getElementById('status').textContent = '❌ Supabase SDK 未加载';
    console.error('❌ Supabase SDK 未找到');
  }
};

// 测试 Supabase 连接
async function testSupabase() {
  console.log('🧪 测试 Supabase 连接...');
  if (!supabaseClient) {
    alert('Supabase 未初始化');
    return;
  }
  
  try {
    const { data, error } = await supabaseClient.from('posts').select('*').limit(1);
    if (error) {
      alert('连接失败: ' + error.message);
      console.error('❌ 连接失败:', error);
    } else {
      alert('✅ 连接成功！找到 ' + (data ? data.length : 0) + ' 篇文章');
      console.log('✅ 连接成功:', data);
    }
  } catch (e) {
    alert('测试出错: ' + e.message);
    console.error('❌ 测试出错:', e);
  }
}

// 测试导航
function testNavigation() {
  console.log('🧪 测试导航功能...');
  
  const navItems = document.querySelectorAll('.nav-item');
  console.log(`找到 ${navItems.length} 个导航项`);
  
  navItems.forEach((item, index) => {
    console.log(`绑定导航 ${index + 1}: ${item.dataset.page}`);
    item.addEventListener('click', (e) => {
      e.preventDefault();
      console.log(`点击导航: ${item.dataset.page}`);
      
      // 切换页面
      const targetPage = item.dataset.page;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${targetPage}`).classList.add('active');
      
      alert(`已切换到: ${targetPage}`);
    });
  });
  
  alert('导航事件已绑定，请点击上方的导航链接测试');
}
</script>
</body>
</html>
